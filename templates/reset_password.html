<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyChessRating - Reset Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width:400px;margin-top:10vh">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h4 class="card-title mb-1 text-center">♟️ MyChessRating</h4>
            <p class="text-center text-muted small mb-4">Choose a new password</p>

            {% if success %}
            <div class="alert alert-success">Password updated. You can now sign in.</div>
            <a href="/login" class="btn btn-primary w-100">Sign in</a>

            {% elif error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% if token %}
            <form method="post" action="/reset-password">
                <input type="hidden" name="token" value="{{ token }}">
                <div class="mb-3">
                    <label class="form-label">New password</label>
                    <input type="password" name="password" class="form-control" required minlength="6" autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm new password</label>
                    <input type="password" name="confirm" class="form-control" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary w-100">Set new password</button>
            </form>
            {% else %}
            <p class="text-center mt-3 small"><a href="/forgot-password">Request a new reset link</a></p>
            {% endif %}

            {% else %}
            <form method="post" action="/reset-password">
                <input type="hidden" name="token" value="{{ token }}">
                <div class="mb-3">
                    <label class="form-label">New password</label>
                    <input type="password" name="password" class="form-control" required minlength="6" autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm new password</label>
                    <input type="password" name="confirm" class="form-control" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary w-100">Set new password</button>
            </form>
            {% endif %}
        </div>
    </div>
</div>
</body>
</html>
