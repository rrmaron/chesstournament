{% extends "base.html" %}
{% block content %}
<h2>Your Tournaments</h2>

<form method="post" action="/tournament" class="mb-4">
    <div class="input-group">
        <input name="name" placeholder="Tournament Name" class="form-control" required>
        <input name="rounds" type="number" value="5" class="form-control" style="max-width: 120px;">
        <button type="submit" class="btn btn-primary">Create Tournament</button>
    </div>
</form>

{% if tournaments %}
<ul class="list-group">
{% for t in tournaments %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        <a href="/tournament/{{ t.id }}">{{ t.name }}</a>
        <span class="badge bg-secondary">{{ t.rounds }} rounds</span>
        <span class="badge bg-info">Round {{ t.current_round or 0 }}</span>
    </li>
{% endfor %}
</ul>
{% else %}
<p>No tournaments yet. Create one above!</p>
{% endif %}
{% endblock %}
