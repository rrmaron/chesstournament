{% extends "base.html" %}
{% block content %}
<h2>Your Tournaments</h2>

<form method="post" action="/tournament" class="mb-4">
    <input name="name" placeholder="Tournament Name" class="form-control mb-2" required>
    <input name="rounds" type="number" value="5" class="form-control mb-2" style="max-width: 150px;">
    <button type="submit" class="btn btn-primary">Create Tournament</button>
</form>

{% if tournaments %}
    <div class="list-group">
    {% for t in tournaments %}
        <a href="/tournament/{{ t.id }}" class="list-group-item list-group-item-action">
            {{ t.name }} — {{ t.rounds }} rounds (current round: {{ t.current_round or 0 }})
        </a>
    {% endfor %}
    </div>
{% else %}
    <p>No tournaments yet.</p>
{% endif %}
{% endblock %}
