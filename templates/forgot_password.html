<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyChessRating - Forgot Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width:400px;margin-top:10vh">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h4 class="card-title mb-1 text-center">♟️ MyChessRating</h4>
            <p class="text-center text-muted small mb-4">Reset your password</p>

            {% if sent %}
            <div class="alert alert-success">{{ message }}</div>
            <p class="text-center mt-3 small"><a href="/login">Back to sign in</a></p>
            {% else %}
            <p class="text-muted small mb-3">Enter the email address on your account and we'll send you a reset link.</p>
            <form method="post" action="/forgot-password">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control" autofocus required
                           placeholder="you@example.com">
                </div>
                <button type="submit" class="btn btn-primary w-100">Send reset link</button>
            </form>
            <p class="text-center mt-3 small"><a href="/login">Back to sign in</a></p>
            {% endif %}
        </div>
    </div>
</div>
</body>
</html>
