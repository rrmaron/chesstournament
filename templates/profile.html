{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">

<h2 class="mb-4">My Player Profile</h2>

{% if saved %}
<div class="alert alert-success alert-dismissible fade show" role="alert">
  Profile saved.
  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endif %}

<div class="card">
  <div class="card-header fw-semibold">Ratings</div>
  <div class="card-body">
    <p class="text-muted small">Set your current ratings so the "What will happen to my ratings?" tool works on the Player Lookup page.</p>
    <form method="post" action="/profile">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Your Name (as it appears in tournaments)</label>
          <input type="text" name="player_name" class="form-control"
                 value="{{ profile.player_name or '' }}" placeholder="e.g. John Smith">
        </div>
        <div class="col-sm-6">
          <label class="form-label">USCF ID</label>
          <input type="text" name="uscf_id" class="form-control"
                 value="{{ profile.uscf_id or '' }}" placeholder="e.g. 12345678">
        </div>
        <div class="col-sm-6">
          <label class="form-label">FIDE ID</label>
          <input type="text" name="fide_id" class="form-control"
                 value="{{ profile.fide_id or '' }}" placeholder="e.g. 2000001">
        </div>
        <div class="col-sm-6">
          <label class="form-label">USCF Regular (Live)</label>
          <input type="number" name="uscf_rating" class="form-control"
                 value="{{ profile.uscf_rating or '' }}" placeholder="e.g. 1650" min="100" max="3000">
        </div>
        <div class="col-sm-6">
          <label class="form-label">USCF Quick (Live)</label>
          <input type="number" name="uscf_quick_rating" class="form-control"
                 value="{{ profile.uscf_quick_rating or '' }}" placeholder="e.g. 1600" min="100" max="3000">
        </div>
        <div class="col-sm-6">
          <label class="form-label">USCF Blitz (Live)</label>
          <input type="number" name="uscf_blitz_rating" class="form-control"
                 value="{{ profile.uscf_blitz_rating or '' }}" placeholder="e.g. 1550" min="100" max="3000">
        </div>
        <div class="col-sm-6">
          <label class="form-label">FIDE Standard</label>
          <input type="number" name="fide_rating" class="form-control"
                 value="{{ profile.fide_rating or '' }}" placeholder="e.g. 1600" min="100" max="3000">
        </div>
        <div class="col-sm-6">
          <label class="form-label">FIDE Rapid</label>
          <input type="number" name="fide_rapid_rating" class="form-control"
                 value="{{ profile.fide_rapid_rating or '' }}" placeholder="e.g. 1580" min="100" max="3000">
        </div>
        <div class="col-sm-6">
          <label class="form-label">FIDE Blitz</label>
          <input type="number" name="fide_blitz_rating" class="form-control"
                 value="{{ profile.fide_blitz_rating or '' }}" placeholder="e.g. 1520" min="100" max="3000">
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/player-lookup" class="btn btn-outline-secondary ms-2">Go to Player Lookup</a>
      </div>
    </form>
  </div>
</div>

</div>
</div>
{% endblock %}
