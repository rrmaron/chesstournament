{% extends "base.html" %}
{% block title %}Player Rating Lookup{% endblock %}
{% block content %}
<style>
  .htmx-indicator { display: none; }
  .htmx-request .htmx-indicator,
  .htmx-request.htmx-indicator { display: block; }
</style>

<div class="row justify-content-center">
<div class="col-md-7">

  <h2 class="mb-4">Player Rating Lookup</h2>

  <div class="mb-4" style="position:relative">
    <label class="form-label fw-semibold">Player Name (type the first 3 or 4 characters and wait about 10 seconds for the lookahead/suggestions to populate</label>
    <input type="text"
           id="name-input"
           class="form-control form-control-lg"
           placeholder="Start typing a name..."
           autocomplete="off"
           hx-get="/api/player-lookup-search"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#lookup-suggestions"
           name="name">
    <div id="lookup-suggestions"></div>
  </div>

  <div id="details-loading" class="htmx-indicator text-center py-4">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Fetching ratings — this may take a few seconds…</p>
  </div>

  <div id="player-details"></div>

  <div id="rating-impact" class="mt-3"></div>

</div>
</div>

<script>
function selectPlayer(name, uscfId) {
  document.getElementById("name-input").value = name;
  document.getElementById("lookup-suggestions").innerHTML = "";
  document.getElementById("rating-impact").innerHTML = "";
  htmx.ajax("GET", "/api/player-details?uscf_id=" + uscfId, {
    target: "#player-details",
    indicator: "#details-loading"
  });
}

function loadRatingImpact(btn) {
  var card = btn.closest("[data-opp-name]");
  var oppName      = card.dataset.oppName;
  var oppUscf      = card.dataset.oppUscf;
  var oppUscfQuick = card.dataset.oppUscfQuick;
  var oppUscfBlitz = card.dataset.oppUscfBlitz;
  var oppFide      = card.dataset.oppFide;
  var oppFideRapid = card.dataset.oppFideRapid;
  var oppFideBlitz = card.dataset.oppFideBlitz;
  var params = new URLSearchParams();
  if (oppName)      params.set("opp_name", oppName);
  if (oppUscf)      params.set("opp_uscf", oppUscf);
  if (oppUscfQuick) params.set("opp_uscf_quick", oppUscfQuick);
  if (oppUscfBlitz) params.set("opp_uscf_blitz", oppUscfBlitz);
  if (oppFide)      params.set("opp_fide", oppFide);
  if (oppFideRapid) params.set("opp_fide_rapid", oppFideRapid);
  if (oppFideBlitz) params.set("opp_fide_blitz", oppFideBlitz);
  htmx.ajax("GET", "/api/rating-impact?" + params.toString(), {
    target: "#rating-impact"
  });
  setTimeout(function() {
    document.getElementById("rating-impact").scrollIntoView({behavior: "smooth"});
  }, 300);
}

// Close suggestions when clicking outside
document.addEventListener("click", function(e) {
  if (!e.target.closest("#name-input") && !e.target.closest("#lookup-suggestions")) {
    document.getElementById("lookup-suggestions").innerHTML = "";
  }
});

function collectProfileData(btn) {
  var card = btn.closest('[data-opp-name]');
  return {
    player_name:       card.dataset.oppName      || '',
    uscf_id:           card.dataset.uscfId        || '',
    fide_id:           card.dataset.fideId        || '',
    uscf_rating:       card.dataset.oppUscf       || '',
    uscf_quick_rating: card.dataset.oppUscfQuick  || '',
    uscf_blitz_rating: card.dataset.oppUscfBlitz  || '',
    fide_rating:       card.dataset.oppFide       || '',
    fide_rapid_rating: card.dataset.oppFideRapid  || '',
    fide_blitz_rating: card.dataset.oppFideBlitz  || '',
  };
}
</script>
{% endblock %}
