<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyChessRating - Verify</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width:400px;margin-top:10vh">
    <div class="card shadow-sm">
        <div class="card-body p-4 text-center">
            <h4 class="card-title mb-2">♟️ Verify your account</h4>
            <p class="text-muted small mb-4">
                We sent a 6-digit code to
                <strong>{{ contact }}</strong>
                via {{ "email" if channel == "email" else "SMS" }}.
            </p>

            {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}

            <form method="post" action="/verify">
                <div class="mb-3">
                    <input type="text" name="code" class="form-control form-control-lg text-center"
                           maxlength="6" pattern="\d{6}" placeholder="000000"
                           autofocus autocomplete="one-time-code" required
                           style="letter-spacing:0.4em;font-size:1.6rem">
                </div>
                <button type="submit" class="btn btn-primary w-100">Verify</button>
            </form>

            <form method="post" action="/verify/resend" class="mt-3">
                <button type="submit" class="btn btn-link btn-sm text-muted">Resend code</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
