<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyChessRating - Create Account</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width:440px;margin-top:8vh">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h4 class="card-title mb-1 text-center">♟️ MyChessRating</h4>
            <p class="text-center text-muted small mb-4">Create your account</p>

            {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}

            <form method="post" action="/register" id="regForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required minlength="6">
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm password</label>
                    <input type="password" name="confirm" class="form-control" required minlength="6">
                </div>

                <div class="mb-3">
                    <label class="form-label">Verify via</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="channel" id="chEmail"
                                   value="email" checked onchange="toggleContact()">
                            <label class="form-check-label" for="chEmail">Email</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="channel" id="chSms"
                                   value="sms" onchange="toggleContact()">
                            <label class="form-check-label" for="chSms">SMS</label>
                        </div>
                    </div>
                </div>

                <div class="mb-4" id="contactField">
                    <label class="form-label" id="contactLabel">Email address</label>
                    <input type="text" name="contact" id="contactInput" class="form-control" required
                           placeholder="you@example.com">
                    <div class="form-text" id="contactHint"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Send verification code</button>
            </form>

            <p class="text-center mt-3 small">Already have an account? <a href="/login">Sign in</a></p>
        </div>
    </div>
</div>
<script>
function toggleContact() {
    const sms = document.getElementById('chSms').checked;
    const label = document.getElementById('contactLabel');
    const input = document.getElementById('contactInput');
    const hint  = document.getElementById('contactHint');
    if (sms) {
        label.textContent = 'Phone number';
        input.placeholder = '+12125551234';
        input.type = 'tel';
        hint.textContent = 'E.164 format: +1 followed by 10 digits (US), or your country code + number.';
    } else {
        label.textContent = 'Email address';
        input.placeholder = 'you@example.com';
        input.type = 'email';
        hint.textContent = '';
    }
}
</script>
</body>
</html>
